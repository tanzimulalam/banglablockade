backend:
  name: github
  repo: tanzimulalam/banglablockade
  branch: main
  base_url: https://bb-oauth-gateway.vercel.app
  auth_endpoint: /api/auth

site_url: https://banglablockade.com
display_url: https://banglablockade.com
logo_url: /brand/logo-mark.png

publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads

locale: en

collections:
  - name: posts
    label: Posts
    folder: content/posts
    create: true
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Category, name: category, widget: select, options: ["Digital Investigation", "Fact Check", "Opinion", "Current Affairs"] }
      - { label: Title (English), name: title_en, widget: string }
      - { label: Title (Bangla), name: title_bn, widget: string }
      - { label: Excerpt (English), name: excerpt_en, widget: text }
      - { label: Excerpt (Bangla), name: excerpt_bn, widget: text }
      - { label: Body (English), name: body_en, widget: markdown }
      - { label: Body (Bangla), name: body_bn, widget: markdown }
      - { label: Author (English), name: author_en, widget: string }
      - { label: Author (Bangla), name: author_bn, widget: string }
      - { label: Publish Date, name: publishedAt, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Cover Image, name: image, widget: image, required: false }

  - name: pages
    label: Editable Pages
    files:
      - label: About Page
        name: about
        file: content/pages/about.md
        fields:
          - { label: Title (English), name: title_en, widget: string }
          - { label: Title (Bangla), name: title_bn, widget: string }
          - { label: Description (English), name: description_en, widget: text }
          - { label: Description (Bangla), name: description_bn, widget: text }
          - { label: Body (English), name: body_en, widget: markdown }
          - { label: Body (Bangla), name: body_bn, widget: markdown }
      - label: Contact Page
        name: contact
        file: content/pages/contact.md
        fields:
          - { label: Title (English), name: title_en, widget: string }
          - { label: Title (Bangla), name: title_bn, widget: string }
          - { label: Description (English), name: description_en, widget: text }
          - { label: Description (Bangla), name: description_bn, widget: text }
          - { label: Body (English), name: body_en, widget: markdown }
          - { label: Body (Bangla), name: body_bn, widget: markdown }
