backend:
  name: github
  repo: tanzimulalam/banglablockade
  branch: main
  base_url: https://bb-oauth-gateway.vercel.app
  auth_endpoint: /api/auth

site_url: https://banglablockade.com
display_url: https://banglablockade.com
logo_url: /brand/logo-mark.png

publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads

locale: en
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: posts
    label: Posts
    folder: content/posts
    create: true
    extension: md
    format: frontmatter
    identifier_field: slug
    sortable_fields: [publishedAt, title.en, category]
    fields:
      - { label: Slug, name: slug, widget: string, hint: "Unique URL part. Example: claim-xyz" }
      - label: Category
        name: category
        widget: select
        options: ["Digital Investigation", "Fact Check", "Opinion", "Current Affairs"]
      - label: Title
        name: title
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Bangla, name: bn, widget: string }
      - label: Excerpt
        name: excerpt
        widget: object
        fields:
          - { label: English, name: en, widget: text }
          - { label: Bangla, name: bn, widget: text }
      - label: Content Paragraphs
        name: content
        widget: list
        fields:
          - label: Paragraph
            name: paragraph
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
      - label: Author
        name: author
        widget: object
        fields:
          - { label: English, name: en, widget: string }
          - { label: Bangla, name: bn, widget: string }
      - { label: Publish Date, name: publishedAt, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Cover Image, name: image, widget: image, required: true, choose_url: false }
      - label: Fact-check Verdict
        name: verdict
        widget: select
        required: false
        options: ["True", "False", "Misleading"]
      - label: Claim Origin
        name: claimOrigin
        widget: object
        required: false
        fields:
          - { label: English, name: en, widget: text, required: false }
          - { label: Bangla, name: bn, widget: text, required: false }
      - label: Methodology
        name: methodology
        widget: list
        required: false
        fields:
          - label: Item
            name: item
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
      - label: Evidence
        name: evidence
        widget: list
        required: false
        fields:
          - label: Item
            name: item
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
      - label: Conclusion
        name: conclusion
        widget: object
        required: false
        fields:
          - { label: English, name: en, widget: text, required: false }
          - { label: Bangla, name: bn, widget: text, required: false }
      - label: Sources
        name: sources
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }

  - name: pages
    label: Editable Pages
    files:
      - label: About Page
        name: about
        file: content/pages/about.md
        fields:
          - label: Title
            name: title
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Bangla, name: bn, widget: string }
          - label: Description
            name: description
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
          - label: Body
            name: body
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
      - label: Contact Page
        name: contact
        file: content/pages/contact.md
        fields:
          - label: Title
            name: title
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Bangla, name: bn, widget: string }
          - label: Description
            name: description
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
          - label: Body
            name: body
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Bangla, name: bn, widget: text }
